<svg xmlns="http://www.w3.org/2000/svg" viewBox="-450 -450 900 900" width="100%" height="100%" style="background-color: #121215;">
  
  <defs>
    <pattern id="greeble-tech" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="50" height="50" fill="#2d2d2d"/>
      <rect x="5" y="5" width="20" height="15" fill="#404040"/>
      <rect x="30" y="10" width="15" height="35" fill="#353535"/>
      <rect x="5" y="25" width="20" height="20" fill="#4a4a4a"/>
      <line x1="15" y1="0" x2="15" y2="50" stroke="#1a1a1a" stroke-width="3"/>
      <line x1="37" y1="20" x2="37" y2="45" stroke="#1a1a1a" stroke-width="2"/>
      <circle cx="15" cy="12" r="3" fill="#111"/>
      <circle cx="15" cy="35" r="3" fill="#111"/>
    </pattern>

    <pattern id="warning-stripes" width="20" height="20" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="10" height="20" fill="#333333"/>
      <rect x="10" width="10" height="20" fill="#777777"/>
    </pattern>

    <pattern id="vents" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="4" fill="#111"/>
      <rect y="4" width="10" height="6" fill="#444"/>
    </pattern>

    <g id="ftl-weapon">
      <polygon points="-15,0 15,0 20,20 -20,20" fill="#444" stroke="#111" stroke-width="3"/>
      <rect x="-10" y="20" width="20" height="10" fill="#333" stroke="#111" stroke-width="3"/>
      <rect x="-8" y="-40" width="6" height="45" fill="#555" stroke="#111" stroke-width="2"/>
      <rect x="2" y="-40" width="6" height="45" fill="#555" stroke="#111" stroke-width="2"/>
      <rect x="-10" y="-15" width="20" height="15" fill="#666" stroke="#111" stroke-width="2"/>
      <line x1="-5" y1="-30" x2="-5" y2="-15" stroke="#222" stroke-width="2"/>
      <line x1="5" y1="-30" x2="5" y2="-15" stroke="#222" stroke-width="2"/>
    </g>

    <g id="engine-pod">
      <polygon points="-50,60 0,20 0,220 -50,180" fill="#3a3a3a" stroke="#111" stroke-width="4"/>
      <polygon points="0,0 90,0 110,20 110,240 90,260 0,260" fill="#6b6b6b" stroke="#111" stroke-width="4"/>
      <polygon points="0,40 100,40 104,50 104,80 100,90 0,90" fill="#444444" stroke="#111" stroke-width="3"/>
      <polygon points="0,150 104,150 108,160 108,180 104,190 0,190" fill="#555555" stroke="#111" stroke-width="3"/>
      <polygon points="0,210 94,210 98,220 98,240 94,250 0,250" fill="#3d3d3d" stroke="#111" stroke-width="3"/>
      <line x1="20" y1="0" x2="20" y2="260" stroke="#888" stroke-width="4"/>
      <line x1="80" y1="20" x2="80" y2="240" stroke="#555" stroke-width="3"/>
      <rect x="40" y="100" width="30" height="40" fill="url(#vents)" stroke="#111" stroke-width="2"/>
      
      <rect x="10" y="260" width="20" height="20" fill="#333" stroke="#111" stroke-width="3"/>
      <polygon points="5,280 35,280 30,300 10,300" fill="#222" stroke="#111" stroke-width="3"/>
      <rect x="40" y="260" width="24" height="25" fill="#333" stroke="#111" stroke-width="3"/>
      <polygon points="35,285 69,285 62,310 42,310" fill="#222" stroke="#111" stroke-width="3"/>
      <rect x="74" y="260" width="20" height="20" fill="#333" stroke="#111" stroke-width="3"/>
      <polygon points="69,280 99,280 94,300 74,300" fill="#222" stroke="#111" stroke-width="3"/>

      <ellipse cx="20" cy="310" rx="6" ry="15" fill="#e0e0e0" opacity="0.8"/>
      <ellipse cx="52" cy="320" rx="8" ry="20" fill="#ffffff" opacity="0.9"/>
      <ellipse cx="84" cy="310" rx="6" ry="15" fill="#e0e0e0" opacity="0.8"/>
    </g>

    <g id="half-ship">
      <polygon points="0,-360 40,-360 80,-300 80,-120 160,0 160,180 120,260 50,300 0,300" fill="#2c2c2c" stroke="#111" stroke-width="5"/>
      
      <polygon points="0,-340 30,-340 60,-290 60,-110 140,10 140,160 100,240 40,280 0,280" fill="url(#greeble-tech)"/>

      <polygon points="0,-320 20,-320 50,-270 50,-100 130,20 130,150 90,220 30,260 0,260" fill="#5c5c5c" stroke="#111" stroke-width="3"/>
      
      <polygon points="0,-280 15,-280 35,-240 35,-80 100,40 100,120 70,190 20,230 0,230" fill="#7d7d7d" stroke="#111" stroke-width="3"/>
      
      <polygon points="0,-220 10,-220 20,-180 20,-60 70,60 70,100 40,150 0,180" fill="#999999" stroke="#111" stroke-width="3"/>

      <g stroke="#333" stroke-width="2" fill="none">
        <line x1="35" y1="-150" x2="50" y2="-150"/>
        <line x1="35" y1="-120" x2="50" y2="-120"/>
        <line x1="100" y1="80" x2="130" y2="80"/>
        <line x1="70" y1="150" x2="130" y2="150"/>
      </g>
      <circle cx="25" cy="-200" r="2" fill="#222"/>
      <circle cx="25" cy="-190" r="2" fill="#222"/>

      <rect x="75" y="-180" width="10" height="30" fill="#222" stroke="#111" stroke-width="2"/>
      <rect x="75" y="-175" width="5" height="20" fill="#555"/>

      <use href="#engine-pod" x="140" y="-10" />

      <use href="#ftl-weapon" x="95" y="-80" transform="rotate(15, 95, -80)"/>

      <polygon points="40,-360 60,-360 70,-340 70,-320 45,-320" fill="#444" stroke="#111" stroke-width="3"/>
      <line x1="70" y1="-330" x2="85" y2="-330" stroke="#777" stroke-width="2"/>
      <line x1="70" y1="-325" x2="90" y2="-325" stroke="#999" stroke-width="2"/>

    </g>
  </defs>

  <use href="#half-ship" />
  <use href="#half-ship" transform="scale(-1, 1)" />

  <rect x="-30" y="-20" width="60" height="100" fill="#3a3a3a" stroke="#111" stroke-width="3"/>
  <rect x="-20" y="-10" width="40" height="80" fill="url(#vents)"/>
  <rect x="-10" y="-30" width="20" height="120" fill="#666" stroke="#111" stroke-width="2"/>

  <polygon points="-30,-310 30,-310 40,-260 20,-240 -20,-240 -40,-260" fill="#4a4a4a" stroke="#111" stroke-width="3"/>
  <polygon points="-20,-300 20,-300 25,-265 10,-255 -10,-255 -25,-265" fill="#6b6b6b" stroke="#111" stroke-width="2"/>
  <polygon points="-15,-295 15,-295 18,-270 -18,-270" fill="#111" stroke="#333" stroke-width="1"/>
  <polygon points="-12,-290 12,-290 14,-275 -14,-275" fill="#88ccff" opacity="0.1"/> <line x1="-5" y1="-295" x2="-5" y2="-270" stroke="#333" stroke-width="2"/>
  <line x1="5" y1="-295" x2="5" y2="-270" stroke="#333" stroke-width="2"/>

  <polygon points="-40,160 40,160 30,280 -30,280" fill="#555" stroke="#111" stroke-width="3"/>
  <polygon points="-20,170 20,170 15,260 -15,260" fill="#777" stroke="#111" stroke-width="2"/>
  <circle cx="0" cy="200" r="10" fill="#222" stroke="#111" stroke-width="2"/>
  <circle cx="0" cy="230" r="10" fill="#222" stroke="#111" stroke-width="2"/>

  <polygon points="35,-240 60,-240 60,-200 35,-200" fill="url(#warning-stripes)"/>
  
  <g stroke="#222" stroke-width="4" fill="none" transform="translate(-80, -40)">
    <line x1="0" y1="0" x2="0" y2="30"/>
    <line x1="15" y1="0" x2="0" y2="15"/>
    <line x1="0" y1="15" x2="15" y2="30"/>
    <line x1="20" y1="15" x2="30" y2="15"/>
    <rect x="35" y="0" width="15" height="30"/>
    <line x1="60" y1="0" x2="60" y2="30"/>
    <line x1="55" y1="5" x2="60" y2="0"/>
  </g>

  <g transform="translate(-190, 100)">
    <circle cx="0" cy="0" r="12" fill="#111" opacity="0.9"/>
    <circle cx="2" cy="1" r="5" fill="#333"/>
    <path d="M 0 0 L -15 -25 L -5 -20 Z" fill="#111" opacity="0.7"/>
    <path d="M -5 -5 Q -10 5 -5 10" stroke="#990000" stroke-width="2" fill="none"/>
    <path d="M 5 0 Q 15 -5 10 -15" stroke="#ccaa00" stroke-width="2" fill="none"/>
  </g>

</svg>